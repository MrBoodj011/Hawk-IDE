name: Hawk Docker Soak

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  docker-soak:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: docker pull node:20-alpine
      - run: npm run build
      - run: npm run test:chaos
      - run: npm run test:docker-soak -- --strict
