name: Hawk Control Plane

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci
      - run: npm run check:deploy
      - name: Verify production configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          SESSION_SIGNING_KEY: ${{ secrets.HAWK_SESSION_SIGNING_KEY }}
          LICENSE_SIGNING_KEY: ${{ secrets.HAWK_LICENSE_SIGNING_KEY }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.HAWK_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.HAWK_GITHUB_OAUTH_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          HAWK_CORS_ORIGINS: ${{ vars.HAWK_CORS_ORIGINS }}
          HAWK_OAUTH_REDIRECT_URIS: ${{ vars.HAWK_OAUTH_REDIRECT_URIS }}
          HAWK_BILLING_RETURN_ORIGINS: ${{ vars.HAWK_BILLING_RETURN_ORIGINS }}
          STRIPE_PRICE_PRO: ${{ vars.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_TEAM: ${{ vars.STRIPE_PRICE_TEAM }}
          STRIPE_PRICE_ENTERPRISE: ${{ vars.STRIPE_PRICE_ENTERPRISE }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in \
            CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_D1_DATABASE_ID \
            SESSION_SIGNING_KEY LICENSE_SIGNING_KEY \
            GITHUB_OAUTH_CLIENT_ID GITHUB_OAUTH_CLIENT_SECRET \
            STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET \
            HAWK_CORS_ORIGINS HAWK_OAUTH_REDIRECT_URIS HAWK_BILLING_RETURN_ORIGINS \
            STRIPE_PRICE_PRO STRIPE_PRICE_TEAM STRIPE_PRICE_ENTERPRISE; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing control-plane configuration: $name"
              missing=1
            fi
          done
          exit "$missing"
      - name: Render Wrangler configuration
        working-directory: deploy/control-plane
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          HAWK_CORS_ORIGINS: ${{ vars.HAWK_CORS_ORIGINS }}
          HAWK_OAUTH_REDIRECT_URIS: ${{ vars.HAWK_OAUTH_REDIRECT_URIS }}
          HAWK_BILLING_RETURN_ORIGINS: ${{ vars.HAWK_BILLING_RETURN_ORIGINS }}
          STRIPE_PRICE_PRO: ${{ vars.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_TEAM: ${{ vars.STRIPE_PRICE_TEAM }}
          STRIPE_PRICE_ENTERPRISE: ${{ vars.STRIPE_PRICE_ENTERPRISE }}
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          let source = fs.readFileSync('wrangler.template.toml', 'utf8');
          for (const name of [
            'CLOUDFLARE_D1_DATABASE_ID',
            'HAWK_CORS_ORIGINS',
            'HAWK_OAUTH_REDIRECT_URIS',
            'HAWK_BILLING_RETURN_ORIGINS',
            'STRIPE_PRICE_PRO',
            'STRIPE_PRICE_TEAM',
            'STRIPE_PRICE_ENTERPRISE',
          ]) {
            const value = process.env[name];
            if (!value) throw new Error(`missing ${name}`);
            source = source.replaceAll(`\${${name}}`, value.replaceAll('\\', '\\\\').replaceAll('"', '\\"'));
          }
          if (source.includes('${')) throw new Error('unresolved Wrangler template value');
          fs.writeFileSync('wrangler.generated.toml', source);
          NODE
      - name: Apply D1 migrations
        working-directory: deploy/control-plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 d1 migrations apply DB --remote --config wrangler.generated.toml
      - name: Deploy control plane
        uses: cloudflare/wrangler-action@v3
        env:
          SESSION_SIGNING_KEY: ${{ secrets.HAWK_SESSION_SIGNING_KEY }}
          LICENSE_SIGNING_KEY: ${{ secrets.HAWK_LICENSE_SIGNING_KEY }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.HAWK_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.HAWK_GITHUB_OAUTH_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deploy/control-plane
          command: deploy --config wrangler.generated.toml
          secrets: |
            SESSION_SIGNING_KEY
            LICENSE_SIGNING_KEY
            GITHUB_OAUTH_CLIENT_ID
            GITHUB_OAUTH_CLIENT_SECRET
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
