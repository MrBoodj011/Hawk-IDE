name: Hawk Production Update Feed

on:
  release:
    types: [published, released]
  workflow_run:
    workflows: ['Hawk Desktop Release']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: hawk-production-update-feed
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
      - name: Build stable and beta feed from published releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/generate-update-feed.mjs --output public/updates/feed.json
      - name: Add immutable service metadata
        shell: bash
        run: |
          cat > public/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Hawk Update Service</title>
          <meta name="robots" content="noindex">
          <h1>Hawk Security IDE Update Service</h1>
          <p>Machine-readable Stable/Beta feed: <a href="./updates/feed.json">feed.json</a></p>
          HTML
          printf 'public, max-age=300\n' > public/_headers
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
