name: Hawk Continuous PR Security

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci
      - name: Analyze the exact pull request diff
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node --import tsx scripts/pr-security-agent.ts --enforce
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hawk-pr-security
          path: artifacts/pr-security/
          if-no-files-found: error
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('artifacts/pr-security/hawk-pr-security.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: artifacts/pr-security/hawk-pr-security.sarif
          category: hawk-pr-security
