name: Hawk Production Monitoring

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    if: github.event_name == 'workflow_dispatch' || vars.HAWK_PRODUCTION_MONITORING_ENABLED == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Probe production services
        id: probe
        env:
          HAWK_UPDATE_URL: ${{ secrets.HAWK_UPDATE_URL }}
          HAWK_CONTROL_PLANE_URL: ${{ secrets.HAWK_CONTROL_PLANE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$HAWK_UPDATE_URL" ]] || { echo "::error::HAWK_UPDATE_URL is missing"; exit 1; }
          [[ -n "$HAWK_CONTROL_PLANE_URL" ]] || {
            echo "::error::HAWK_CONTROL_PLANE_URL is missing"
            exit 1
          }
          curl --fail --silent --show-error --max-time 15 "$HAWK_UPDATE_URL/health" > update.json
          curl --fail --silent --show-error --max-time 15 "$HAWK_CONTROL_PLANE_URL/health" > control.json
          node -e "
            for (const path of ['update.json', 'control.json']) {
              const value = require('./' + path);
              if (value.ok !== true) throw new Error(path + ' is unhealthy');
            }
          "
      - name: Open or update outage issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Production health check is failing';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'production-incident',
            });
            const body = [
              `Hawk production monitoring failed at ${new Date().toISOString()}.`,
              '',
              `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['production-incident'],
              });
            }
