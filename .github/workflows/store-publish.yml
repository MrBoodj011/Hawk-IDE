name: Hawk Companion Store Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Companion store'
        required: true
        type: choice
        options:
          - chrome
          - burp
      version:
        description: 'Store version (for example 0.2.0)'
        required: true
        default: '0.2.0'
      public_source_url:
        description: 'Public source URL required by the BApp Store'
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  chrome:
    if: inputs.target == 'chrome'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify Chrome Web Store configuration
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.CHROME_SERVICE_ACCOUNT_JSON }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$GOOGLE_CREDENTIALS" ]]
          [[ -n "$PUBLISHER_ID" ]]
          [[ -n "$EXTENSION_ID" ]]
      - name: Stamp and package browser companion
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          mkdir -p dist/browser
          cp -R integrations/browser/. dist/browser/
          node -e "
            const fs = require('node:fs');
            const path = 'dist/browser/manifest.json';
            const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
            manifest.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(manifest, null, 2) + '\n');
          "
          (cd dist/browser && zip -9 -r ../Hawk-Browser-Companion.zip .)
      - name: Resolve service account
        id: service-account
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.CHROME_SERVICE_ACCOUNT_JSON }}
        shell: bash
        run: |
          node -e "
            const value = JSON.parse(process.env.GOOGLE_CREDENTIALS);
            if (!value.client_email) throw new Error('service account client_email is missing');
            require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'email=' + value.client_email + '\n');
          "
      - uses: google-github-actions/auth@v3
        id: google-auth
        with:
          credentials_json: ${{ secrets.CHROME_SERVICE_ACCOUNT_JSON }}
          service_account: ${{ steps.service-account.outputs.email }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore
      - name: Upload and submit to Chrome Web Store review
        env:
          TOKEN: ${{ steps.google-auth.outputs.access_token }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://chromewebstore.googleapis.com"
          curl --fail-with-body \
            -H "Authorization: Bearer $TOKEN" \
            -X POST -T dist/Hawk-Browser-Companion.zip \
            "$api/upload/v2/publishers/$PUBLISHER_ID/items/$EXTENSION_ID:upload"
          curl --fail-with-body \
            -H "Authorization: Bearer $TOKEN" \
            -X POST \
            "$api/v2/publishers/$PUBLISHER_ID/items/$EXTENSION_ID:publish"

  burp:
    if: inputs.target == 'burp'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Verify public-source submission requirements
        env:
          PUBLIC_SOURCE_URL: ${{ inputs.public_source_url }}
          BAPP_SUBMISSION_TOKEN: ${{ secrets.BAPP_SUBMISSION_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$PUBLIC_SOURCE_URL" =~ ^https://github.com/[^/]+/[^/]+/?$ ]] || {
            echo "::error::PortSwigger requires a public GitHub source repository."
            exit 1
          }
          [[ -n "$BAPP_SUBMISSION_TOKEN" ]] || {
            echo "::error::BAPP_SUBMISSION_TOKEN is missing."
            exit 1
          }
      - run: gradle --no-daemon -p integrations/burp clean jar
      - name: Submit BApp review issue
        env:
          GH_TOKEN: ${{ secrets.BAPP_SUBMISSION_TOKEN }}
          PUBLIC_SOURCE_URL: ${{ inputs.public_source_url }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/bapp-submission.md" <<EOF
          ## Hawk Burp Companion

          Source: $PUBLIC_SOURCE_URL
          Version: $VERSION

          Hawk Burp Companion streams explicitly paired and scoped Burp traffic
          to the local Hawk Security IDE evidence plane. It does not send traffic
          to a cloud service and requires the rotating local pairing token.

          Build: \`gradle --no-daemon clean jar\`

          Setup and operation are documented in \`integrations/burp/README.md\`.
          EOF
          gh issue create \
            --repo PortSwigger/extension-portal \
            --title "New extension submission: Hawk Burp Companion" \
            --body-file "$RUNNER_TEMP/bapp-submission.md"
