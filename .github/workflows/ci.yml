name: Hawk CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm run check:extension
      - run: npm run package:extension
      - uses: actions/upload-artifact@v4
        with:
          name: hawk-security-ide-vsix
          path: extensions/pentesterflow-ide/*.vsix
          if-no-files-found: error
