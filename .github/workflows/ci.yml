name: Hawk CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run check:extension
      - run: npm run package:extension
      - run: npm run test:e2e-runtime:built
      - uses: actions/upload-artifact@v4
        with:
          name: hawk-security-ide-vsix
          path: extensions/hawk-security-ide/*.vsix
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: hawk-coverage
          path: coverage
          if-no-files-found: error

  platform-smoke:
    name: Runtime smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build:extension
      - run: npm run test:e2e-runtime:built

  integrations:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - run: npm ci
      - run: npm run check:integrations
      - run: gradle --no-daemon -p integrations/burp clean jar
      - uses: actions/upload-artifact@v4
        with:
          name: hawk-burp-companion
          path: integrations/burp/build/libs/*.jar
          if-no-files-found: error
