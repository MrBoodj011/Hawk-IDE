name: Hawk CLI Artifact Dry Run

# Standalone CLI artifact verification. Personal GitHub Releases are owned by
# desktop-release.yml; this workflow never publishes a competing release.
#
# Pipeline: verify (full CI) -> cross-platform standalone binaries (Bun) ->
# GitHub Release with SHA256SUMS + auto-generated notes -> npm publish
# (tag pushes only, when an NPM_TOKEN secret is configured).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to release against (e.g. v0.1.0)'
        required: true

permissions:
  contents: write # create the Release + upload assets
  id-token: write # npm publish --provenance

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      should_publish_release: ${{ steps.version.outputs.should_publish_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            git fetch --tags --force
            latest="$(
              git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              head -n 1 ||
              true
            )"
            if [[ -z "${latest}" ]]; then
              latest="v0.1.0"
            fi
            IFS=. read -r major minor patch <<< "${latest#v}"
            release_tag="v${major}.${minor}.$((patch + 1))"
            should_publish_release="false"
          else
            release_tag="${{ github.event.inputs.tag }}"
            should_publish_release="false"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=Hawk Security IDE ${release_tag}"
            echo "should_publish_release=${should_publish_release}"
          } >> "$GITHUB_OUTPUT"

  # Gate: never ship anything unless the full suite is green.
  verify:
    name: verify
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run ci # typecheck -> lint -> test -> build

  # One artifact per OS/arch. Bun cross-compiles every target from a single
  # Linux host, so the whole matrix runs without dedicated platform runners.
  binaries:
    name: build ${{ matrix.name }}
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: bun-linux-x64-baseline, name: hawk-linux-x64 }
          - { target: bun-linux-arm64, name: hawk-linux-arm64 }
          - { target: bun-windows-x64-baseline, name: hawk-windows-x64.exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Stamp version into the binary
        run: |
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          if [[ "${RELEASE_TAG}" == v* ]]; then
            VER="${RELEASE_TAG#v}"
          else
            VER="main-${GITHUB_SHA::7}"
          fi
          # The Bun-compiled binary doesn't run tsup's --define, so it reads
          # the FALLBACK in version.ts. Patch it to the release version so
          # `hawk --version` reports correctly. No-op if unmatched.
          sed -i "s/const FALLBACK = 'dev';/const FALLBACK = '${VER}';/" src/version/version.ts
      - name: Compile standalone binary
        run: |
          mkdir -p dist-bin
          bun build src/cli/index.ts \
            --compile \
            --minify \
            --target ${{ matrix.target }} \
            --outfile dist-bin/${{ matrix.name }}
      - name: Checksum
        run: cd dist-bin && sha256sum "${{ matrix.name }}" > "${{ matrix.name }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist-bin/*
          if-no-files-found: error

  extension:
    name: package Code-OSS extension
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run check:extension
      - run: npm run package:extension
      - uses: actions/upload-artifact@v4
        with:
          name: hawk-security-ide-vsix
          path: extensions/hawk-security-ide/*.vsix
          if-no-files-found: error

  # Collect every binary + a combined SHA256SUMS into one GitHub Release.
  release:
    name: github release
    needs: [prepare, binaries, extension]
    if: needs.prepare.outputs.should_publish_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create numbered release tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.prepare.outputs.release_tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ needs.prepare.outputs.release_tag }}"
      - uses: actions/download-artifact@v4
        with:
          path: dist-bin
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: hawk-security-ide-vsix
          path: dist-extension
      - name: Aggregate checksums
        run: |
          cd dist-bin
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          for extension in ../dist-extension/*.vsix; do
            test -s "$extension"
            sha256sum "$extension" >> SHA256SUMS
          done
          echo "Release assets:" && ls -la
      # Never publish a partial / out-of-sync release: every expected binary
      # must be present AND listed in SHA256SUMS before we cut the release.
      # A missing windows entry here is exactly what broke installs in #14.
      - name: Verify release assets are complete and consistent
        run: |
          set -euo pipefail
          cd dist-bin
          expected=(
            hawk-linux-x64
            hawk-linux-arm64
            hawk-windows-x64.exe
          )
          test -s SHA256SUMS || { echo "::error::SHA256SUMS is missing or empty"; exit 1; }
          fail=0
          for a in "${expected[@]}"; do
            if [[ ! -s "$a" ]]; then
              echo "::error::release asset missing or empty: $a"; fail=1
            fi
            if ! awk -v a="$a" '$2==a{found=1} END{exit !found}' SHA256SUMS; then
              echo "::error::SHA256SUMS does not list $a"; fail=1
            fi
          done
          extension_count=$(find ../dist-extension -maxdepth 1 -name '*.vsix' -type f -size +0c | wc -l)
          if [[ "$extension_count" != "1" ]]; then
            echo "::error::expected exactly one non-empty Hawk Security IDE VSIX asset"; fail=1
          fi
          exit "$fail"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true
          files: |
            dist-bin/*
            dist-extension/*

  dry-run:
    name: dry-run artifacts
    needs: [prepare, binaries, extension]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-bin
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: hawk-security-ide-vsix
          path: dist-extension
      - name: Aggregate checksums
        run: |
          cd dist-bin
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          for extension in ../dist-extension/*.vsix; do
            test -s "$extension"
            sha256sum "$extension" >> SHA256SUMS
          done
          echo "Dry-run assets:" && ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-${{ needs.prepare.outputs.release_tag }}
          path: |
            dist-bin/*
            dist-extension/*
          if-no-files-found: error
