name: Hawk Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Artifact version (for example v0.7.0)'
        required: true
        default: 'v0.7.0'
      publish:
        description: 'Attach the verified artifacts to a GitHub Release'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: hawk-desktop-${{ github.ref_name }}-${{ inputs.tag || '' }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      upstream_repository: ${{ steps.upstream.outputs.repository }}
      upstream_ref: ${{ steps.upstream.outputs.ref }}
      node: ${{ steps.upstream.outputs.node }}
      publish: ${{ steps.meta.outputs.publish }}
      channel: ${{ steps.meta.outputs.channel }}
      quality: ${{ steps.meta.outputs.quality }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
            publish=true
          else
            tag="${{ inputs.tag }}"
            publish="${{ inputs.publish }}"
          fi
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]] || {
            echo "::error::release tag must look like v0.7.0"
            exit 1
          }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          if [[ "$tag" =~ -(beta|rc)([.-][0-9]+)?$ ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "quality=insider" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "quality=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - id: upstream
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const value = require('./desktop/upstream.json');
          for (const key of ['repository', 'ref', 'node']) {
            if (!value[key]) throw new Error(`desktop/upstream.json is missing ${key}`);
            console.log(`${key}=${value[key]}`);
          }
          NODE
      - name: Bind release tag to Hawk package versions
        shell: bash
        env:
          HAWK_RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const expected = process.env.HAWK_RELEASE_VERSION;
          const manifests = [
            ['package.json', JSON.parse(fs.readFileSync('package.json', 'utf8')).version],
            ['extensions/hawk-security-ide/package.json', JSON.parse(fs.readFileSync('extensions/hawk-security-ide/package.json', 'utf8')).version],
            ['integrations/browser/manifest.json', JSON.parse(fs.readFileSync('integrations/browser/manifest.json', 'utf8')).version],
          ];
          for (const [file, version] of manifests) {
            if (version !== expected) throw new Error(`${file} is ${version}; release tag requires ${expected}`);
          }
          NODE

  verify:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci
      - name: Enforce semantic index memory budget
        run: npm run benchmark:index-memory
      - run: npm run ci

  integrations:
    needs: [prepare, verify]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - run: npm ci
      - run: npm run check:integrations
      - name: Package browser companion
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          (
            cd integrations/browser
            zip -9 -r "../../artifacts/Hawk-Browser-Companion-${{ needs.prepare.outputs.version }}.zip" .
          )
      - name: Build Burp companion
        run: gradle --no-daemon -p integrations/burp clean jar
      - name: Collect Burp companion
        shell: bash
        run: |
          cp integrations/burp/build/libs/hawk-burp-companion-*.jar \
            "artifacts/Hawk-Burp-Companion-${{ needs.prepare.outputs.version }}.jar"
      - uses: actions/upload-artifact@v4
        with:
          name: hawk-capture-companions
          path: artifacts/*
          if-no-files-found: error

  desktop:
    needs: [prepare, verify]
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: win32
            arch: x64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      HAWK_VERSION: ${{ needs.prepare.outputs.version }}
      HAWK_TAG: ${{ needs.prepare.outputs.tag }}
      BUILD_SOURCEVERSION: ${{ github.sha }}
      GITHUB_TOKEN: ${{ github.token }}
      HAWK_PFX_SIGNING_CONFIGURED: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' }}
      HAWK_AZURE_SIGNING_CONFIGURED: >-
        ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT != '' &&
        secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT != '' &&
        secrets.AZURE_ARTIFACT_SIGNING_PROFILE != '' &&
        secrets.AZURE_TENANT_ID != '' &&
        secrets.AZURE_CLIENT_ID != '' &&
        secrets.AZURE_CLIENT_SECRET != '' }}
      HAWK_WINDOWS_PUBLISHER: ${{ vars.HAWK_WINDOWS_PUBLISHER }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
      AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
      AZURE_ARTIFACT_SIGNING_PROFILE: ${{ secrets.AZURE_ARTIFACT_SIGNING_PROFILE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.upstream_repository }}
          ref: ${{ needs.prepare.outputs.upstream_ref }}
          fetch-depth: 1
          path: upstream
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.prepare.outputs.node }}
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Hawk built-in extension
        shell: bash
        run: |
          npm ci
          node desktop/stamp-extension-version.mjs "$HAWK_VERSION"
          npm run build:extension
      - name: Prepare branded Code-OSS source
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --source "$GITHUB_WORKSPACE/upstream"
            --out "$RUNNER_TEMP/hawk-codeoss"
            --extension "$GITHUB_WORKSPACE/extensions/hawk-security-ide"
            --version "$HAWK_VERSION"
            --quality "${{ needs.prepare.outputs.quality }}"
            --force
          )
          node desktop/prepare-code-oss.mjs "${args[@]}"
          node -e "require('fs').rmSync(process.argv[1], { recursive: true, force: true })" \
            "$GITHUB_WORKSPACE/upstream"

      - name: Install Linux build prerequisites
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential fakeroot rpm pkg-config libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev libgtk-3-dev libnss3-dev libasound2-dev

      - name: Install Code-OSS dependencies
        working-directory: ${{ runner.temp }}/hawk-codeoss
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm install --no-audit --no-fund; then
              exit 0
            fi
            if [[ "$attempt" == 3 ]]; then
              echo "::error::Code-OSS dependency installation failed after $attempt attempts."
              exit 1
            fi
            echo "::warning::Code-OSS dependency installation failed on attempt $attempt; retrying."
            sleep $((attempt * 15))
          done

      - name: Expose Windows SDK signing tools
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe |
            Where-Object FullName -Match '\\x64\\signtool\.exe$' |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (!$signtool) { throw 'signtool.exe was not found in the Windows SDK.' }
          $signtool.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Materialise the PFX once in the ephemeral runner. Keeping the path in
      # GITHUB_ENV means the application and both installer packages are
      # signed with the exact same identity, while the certificate/password
      # never enter the repository or an artifact.
      - name: Materialise Windows signing certificate
        if: matrix.platform == 'win32' && env.HAWK_PFX_SIGNING_CONFIGURED == 'true'
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        shell: pwsh
        run: |
          $path = Join-Path $env:RUNNER_TEMP 'hawk-signing.pfx'
          try {
            $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          } catch {
            throw 'WINDOWS_CERTIFICATE_BASE64 is not valid base64.'
          }
          if ($bytes.Length -lt 512) { throw 'The Windows PFX is unexpectedly small.' }
          [IO.File]::WriteAllBytes($path, $bytes)
          "HAWK_CERT_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Restrict the temporary file to the runner account where supported.
          & icacls.exe $path /inheritance:r /grant:r "${env:USERNAME}:(R)" | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'Could not restrict access to the temporary signing certificate.' }

      - name: Build Windows desktop
        if: matrix.platform == 'win32'
        working-directory: ${{ runner.temp }}/hawk-codeoss
        shell: pwsh
        run: |
          $target = "vscode-win32-${{ matrix.arch }}-min"
          foreach ($attempt in 1..2) {
            npm run gulp $target
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq 2) { throw "$target failed after $attempt attempts." }
            Write-Warning "$target failed on attempt $attempt; retrying."
            Start-Sleep -Seconds 20
          }
          $portable = Join-Path $env:RUNNER_TEMP "VSCode-win32-${{ matrix.arch }}"
          if (!(Test-Path (Join-Path $portable 'Hawk.exe'))) {
            throw 'Hawk.exe was not produced by the Code-OSS package task.'
          }

      - name: Sign Windows application
        if: matrix.platform == 'win32'
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $publishing = '${{ needs.prepare.outputs.publish }}' -eq 'true'
          if ($publishing -and !$env:HAWK_WINDOWS_PUBLISHER) {
            throw 'Published Hawk releases require the HAWK_WINDOWS_PUBLISHER repository variable.'
          }
          $artifactSigning = $env:AZURE_ARTIFACT_SIGNING_ENDPOINT -and `
            $env:AZURE_ARTIFACT_SIGNING_ACCOUNT -and `
            $env:AZURE_ARTIFACT_SIGNING_PROFILE -and `
            $env:AZURE_TENANT_ID -and $env:AZURE_CLIENT_ID -and $env:AZURE_CLIENT_SECRET
          if (!$env:WINDOWS_CERTIFICATE_BASE64) {
            if ($artifactSigning) {
              'Azure Artifact Signing is configured; the next step will sign Hawk.exe.'
              exit 0
            }
            if ($publishing) {
              throw 'Published Hawk releases require PFX secrets or Azure Artifact Signing credentials.'
            }
            'Dry-run build: no trusted Windows certificate is configured; publication is blocked.'
            exit 0
          }
          & "$env:GITHUB_WORKSPACE\desktop\windows\sign-artifacts.ps1" `
            -Artifact (Join-Path $env:RUNNER_TEMP "VSCode-win32-${{ matrix.arch }}\Hawk.exe") `
            -CertificatePath $env:HAWK_CERT_PATH `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD `
            -ExpectedSubject $env:HAWK_WINDOWS_PUBLISHER

      - name: Sign Windows application with Azure Artifact Signing
        if: >-
          matrix.platform == 'win32' &&
          env.HAWK_PFX_SIGNING_CONFIGURED != 'true' &&
          env.HAWK_AZURE_SIGNING_CONFIGURED == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_ARTIFACT_SIGNING_PROFILE }}
          files: ${{ runner.temp }}\VSCode-win32-${{ matrix.arch }}\Hawk.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Hawk Security IDE

      - name: Verify Windows application signature
        if: >-
          matrix.platform == 'win32' &&
          (env.HAWK_PFX_SIGNING_CONFIGURED == 'true' ||
          env.HAWK_AZURE_SIGNING_CONFIGURED == 'true')
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\desktop\windows\sign-artifacts.ps1" `
            -Artifact (Join-Path $env:RUNNER_TEMP "VSCode-win32-${{ matrix.arch }}\Hawk.exe") `
            -ExpectedSubject $env:HAWK_WINDOWS_PUBLISHER `
            -VerifyOnly

      - name: Build Windows installers
        if: matrix.platform == 'win32'
        working-directory: ${{ runner.temp }}/hawk-codeoss
        shell: pwsh
        run: |
          choco install nsis wixtoolset --yes --no-progress
          $artifacts = Join-Path $env:GITHUB_WORKSPACE 'artifacts'
          New-Item -ItemType Directory -Force $artifacts | Out-Null
          $portable = Join-Path $env:RUNNER_TEMP "VSCode-win32-${{ matrix.arch }}"
          Compress-Archive -Path "$portable\*" `
            -DestinationPath "$artifacts\Hawk-windows-${{ matrix.arch }}-$env:HAWK_VERSION-portable.zip" `
            -CompressionLevel Optimal
          & "$env:GITHUB_WORKSPACE\desktop\windows\package-installer.ps1" `
            -SourceDir $portable `
            -Version $env:HAWK_VERSION `
            -Output "$artifacts\HawkSetup-windows-${{ matrix.arch }}-$env:HAWK_VERSION.exe"
          & "$env:GITHUB_WORKSPACE\desktop\windows\package-msi.ps1" `
            -SourceDir $portable `
            -Version $env:HAWK_VERSION `
            -Output "$artifacts\Hawk-windows-${{ matrix.arch }}-$env:HAWK_VERSION.msi"

      - name: Sign Windows installers
        if: matrix.platform == 'win32'
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $publishing = '${{ needs.prepare.outputs.publish }}' -eq 'true'
          if ($publishing -and !$env:HAWK_WINDOWS_PUBLISHER) {
            throw 'Published Hawk releases require the HAWK_WINDOWS_PUBLISHER repository variable.'
          }
          $artifactSigning = $env:AZURE_ARTIFACT_SIGNING_ENDPOINT -and `
            $env:AZURE_ARTIFACT_SIGNING_ACCOUNT -and `
            $env:AZURE_ARTIFACT_SIGNING_PROFILE -and `
            $env:AZURE_TENANT_ID -and $env:AZURE_CLIENT_ID -and $env:AZURE_CLIENT_SECRET
          if (!$env:WINDOWS_CERTIFICATE_BASE64) {
            if ($artifactSigning) {
              'Azure Artifact Signing is configured; the next step will sign the installers.'
              exit 0
            }
            if ($publishing) { throw 'Published Hawk installers may not be unsigned.' }
            'Dry-run installers remain unsigned; publication is blocked.'
            exit 0
          }
          $targets = @(
            Get-ChildItem artifacts -File |
              Where-Object { $_.Extension.ToLowerInvariant() -in @('.exe', '.msi') } |
              ForEach-Object FullName
          )
          if ($targets.Count -lt 2) { throw 'Expected EXE and MSI signing targets.' }
          & "$env:GITHUB_WORKSPACE\desktop\windows\sign-artifacts.ps1" `
            -Artifact $targets `
            -CertificatePath $env:HAWK_CERT_PATH `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD `
            -ExpectedSubject $env:HAWK_WINDOWS_PUBLISHER

      - name: Sign Windows installers with Azure Artifact Signing
        if: >-
          matrix.platform == 'win32' &&
          env.HAWK_PFX_SIGNING_CONFIGURED != 'true' &&
          env.HAWK_AZURE_SIGNING_CONFIGURED == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\artifacts
          files-folder-filter: exe,msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Hawk Security IDE

      - name: Verify Windows installer signatures
        if: >-
          matrix.platform == 'win32' &&
          (env.HAWK_PFX_SIGNING_CONFIGURED == 'true' ||
          env.HAWK_AZURE_SIGNING_CONFIGURED == 'true')
        shell: pwsh
        run: |
          $targets = @(
            Get-ChildItem artifacts -File |
              Where-Object { $_.Extension.ToLowerInvariant() -in @('.exe', '.msi') } |
              ForEach-Object FullName
          )
          & "$env:GITHUB_WORKSPACE\desktop\windows\sign-artifacts.ps1" `
            -Artifact $targets `
            -ExpectedSubject $env:HAWK_WINDOWS_PUBLISHER `
            -VerifyOnly

      - name: Build Linux desktop and packages
        if: matrix.platform == 'linux'
        working-directory: ${{ runner.temp }}/hawk-codeoss
        shell: bash
        run: |
          set -euo pipefail
          run_gulp_with_retry() {
            for attempt in 1 2; do
              if npm run gulp "$@"; then
                return 0
              fi
              if [[ "$attempt" == 2 ]]; then
                echo "::error::gulp $* failed after $attempt attempts."
                return 1
              fi
              echo "::warning::gulp $* failed on attempt $attempt; retrying."
              sleep 20
            done
          }
          run_gulp_with_retry "vscode-linux-${{ matrix.arch }}-min"
          portable="$RUNNER_TEMP/VSCode-linux-${{ matrix.arch }}"
          test -x "$portable/hawk"
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          tar -C "$RUNNER_TEMP" -czf \
            "$GITHUB_WORKSPACE/artifacts/Hawk-linux-${{ matrix.arch }}-$HAWK_VERSION.tar.gz" \
            "VSCode-linux-${{ matrix.arch }}"
          run_gulp_with_retry "vscode-linux-${{ matrix.arch }}-prepare-deb"
          run_gulp_with_retry "vscode-linux-${{ matrix.arch }}-build-deb"
          deb="$(find ".build/linux/deb" -type f -name '*.deb' -size +0c | head -n 1)"
          test -n "$deb"
          cp "$deb" "$GITHUB_WORKSPACE/artifacts/Hawk-linux-${{ matrix.arch }}-$HAWK_VERSION.deb"
          bash "$GITHUB_WORKSPACE/desktop/linux/package-appimage.sh" \
            "$portable" "$HAWK_VERSION" \
            "$GITHUB_WORKSPACE/artifacts/Hawk-linux-${{ matrix.arch }}-$HAWK_VERSION.AppImage"

      - name: Verify desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          find artifacts -maxdepth 1 -type f -size +0c -print
          count="$(find artifacts -maxdepth 1 -type f -size +0c | wc -l | tr -d ' ')"
          [[ "$count" -ge 2 ]]
      - uses: actions/upload-artifact@v4
        with:
          name: hawk-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: [prepare, integrations, desktop]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cp LICENSE NOTICE RESPONSIBLE_USE.md SECURITY.md dist/
          (
            cd dist
            legacy='pente''sterflow'
            if find . -maxdepth 1 -type f -iname "*${legacy}*" | grep -q .; then
              echo "::error::legacy-branded release asset detected"
              exit 1
            fi
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 |
              sort -z |
              xargs -0 sha256sum > SHA256SUMS
            test -s SHA256SUMS
          )
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Hawk Security IDE ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          make_latest: ${{ needs.prepare.outputs.prerelease == 'false' }}
          files: dist/*

  update-smoke:
    needs: [prepare, release]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
      - name: Exercise real signed private-feed update
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HAWK_WINDOWS_PUBLISHER: ${{ vars.HAWK_WINDOWS_PUBLISHER }}
        shell: pwsh
        run: |
          node scripts/test-private-update.mjs `
            --from 0.0.0 `
            --to '${{ needs.prepare.outputs.tag }}' `
            --require-signature `
            --result .tmp/candidate-update.json
      - name: Exercise real signed installer upgrade
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HAWK_WINDOWS_PUBLISHER: ${{ vars.HAWK_WINDOWS_PUBLISHER }}
          HAWK_ALLOW_INSTALLER_EXECUTION: '1'
        shell: pwsh
        run: |
          $currentTag = '${{ needs.prepare.outputs.tag }}'
          $currentVersion = [version](($currentTag -replace '^v', '') -replace '[-+].*$', '')
          $releases = gh api "repos/${{ github.repository }}/releases?per_page=100" | ConvertFrom-Json
          $candidates = @(
            foreach ($release in $releases) {
              if ($release.draft -or $release.tag_name -eq $currentTag) { continue }
              $text = (($release.tag_name -replace '^v', '') -replace '[-+].*$', '')
              try { $version = [version]$text } catch { continue }
              if ($version -lt [version]'0.7.0' -or $version -ge $currentVersion) { continue }
              if (!($release.assets | Where-Object name -Match '^HawkSetup-windows-x64-.+\.exe$')) { continue }
              [pscustomobject]@{ tag = $release.tag_name; version = $version }
            }
          )
          $previous = $candidates | Sort-Object version -Descending | Select-Object -First 1
          if (!$previous) {
            if ($currentVersion -gt [version]'0.7.0') {
              throw "No previous Hawk 0.7+ installer exists for a real upgrade test."
            }
            "First signed 0.7.x candidate: feed/signature smoke passed; upgrade execution begins with v0.7.1." |
              Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }
          node scripts/test-private-update.mjs `
            --from 0.0.0 `
            --to $previous.tag `
            --require-signature `
            --output .tmp/previous-update `
            --result .tmp/previous-update.json
          $old = Get-Content .tmp/previous-update.json | ConvertFrom-Json
          $candidate = Get-Content .tmp/candidate-update.json | ConvertFrom-Json
          & ./scripts/test-windows-upgrade.ps1 `
            -PreviousInstaller $old.installer `
            -PreviousVersion ([string]$previous.version) `
            -CandidateInstaller $candidate.installer `
            -CandidateVersion ([string]$currentVersion) `
            -ExpectedPublisher $env:HAWK_WINDOWS_PUBLISHER
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hawk-update-smoke-${{ needs.prepare.outputs.version }}
          path: .tmp/*.json
          if-no-files-found: warn
