name: Hawk Beta feedback
description: Report a Beta workflow, reliability, install, update, or usability problem.
title: "[Beta] "
labels: ["beta-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include targets, credentials, private source, captures, or vulnerability details.
        Report security issues through a private security advisory.
  - type: input
    id: version
    attributes:
      label: Hawk version
      placeholder: v0.2.0-beta.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows x64
        - Linux x64
        - macOS Intel
        - macOS Apple Silicon
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Workflow
      options:
        - Install or update
        - Hawk AI agent
        - Security scan
        - Browser or Burp capture
        - Evidence or report
        - MCP or Docker orchestration
        - Account, team, sync, billing, or license
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Redacted reproduction steps
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed secrets, source code, target data, captures, and personal data.
          required: true
